<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ Chatbot | CodeAlpha</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0f1420;
      --surface2: #161c2e;
      --surface3: #1e2540;
      --border: #222844;
      --accent: #00d4ff;
      --accent2: #38bdf8;
      --accent-glow: rgba(0,212,255,0.12);
      --bot-bubble: #101828;
      --user-bubble: #1a2550;
      --text: #e2e8f8;
      --muted: #6b7fa8;
      --success: #34d399;
      --warning: #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .bot-avatar {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .header-info h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .status-dot {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.75rem; color: var(--success);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .badge {
      background: var(--accent-glow);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Layout */
    .app {
      flex: 1;
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      padding: 0 16px;
      gap: 20px;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      padding: 24px 0;
    }
    @media(max-width: 768px) { .sidebar { display: none; } }

    .sidebar h3 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .topic-btn {
      display: block;
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 6px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .topic-btn:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    .sidebar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 20px;
    }
    .sidebar-card h4 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .sidebar-card p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Chat area */
    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      min-width: 0;
    }

    .chat-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: calc(100vh - 140px);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.bot .msg-avatar { background: linear-gradient(135deg, #0ea5e9, #6366f1); }
    .msg.user .msg-avatar { background: var(--surface3); }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.92rem;
      line-height: 1.6;
    }
    .msg.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid #2a3668;
      border-top-right-radius: 4px;
      color: #c7d7f7;
    }

    .bubble .confidence {
      display: inline-block;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 999px;
      margin-top: 8px;
    }
    .conf-high { background: rgba(52,211,153,0.12); color: var(--success); }
    .conf-med  { background: rgba(251,191,36,0.12);  color: var(--warning); }
    .conf-low  { background: rgba(248,113,113,0.12); color: #f87171; }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px;
    }
    .sug-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent2);
      font-size: 0.78rem;
      padding: 4px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .sug-btn:hover { background: var(--accent-glow); border-color: var(--accent); }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
    .typing-indicator span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* Input */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 11px 16px;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--muted); }

    .send-btn {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
      border: none;
      color: white;
      width: 42px; height: 42px;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      transition: opacity 0.2s, transform 0.15s;
    }
    .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="bot-avatar">🤖</div>
    <div class="header-info">
      <h2>SupportBot</h2>
      <div class="status-dot"><div class="dot"></div> Online</div>
    </div>
  </div>
  <div class="badge">CodeAlpha Project</div>
</header>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Quick Topics</h3>
    <button class="topic-btn" onclick="askTopic('What are your working hours?')">🕐 Working Hours</button>
    <button class="topic-btn" onclick="askTopic('What is the refund policy?')">💰 Refund Policy</button>
    <button class="topic-btn" onclick="askTopic('How do I reset my password?')">🔑 Password Reset</button>
    <button class="topic-btn" onclick="askTopic('How do I contact support?')">📞 Contact Support</button>
    <button class="topic-btn" onclick="askTopic('What payment methods do you accept?')">💳 Payment Methods</button>
    <button class="topic-btn" onclick="askTopic('How do I track my order?')">📦 Track Order</button>
    <button class="topic-btn" onclick="askTopic('Is my data secure?')">🔒 Data Security</button>
    <button class="topic-btn" onclick="askTopic('How to cancel my subscription?')">❌ Cancel Subscription</button>

    <div class="sidebar-card">
      <h4>⚙️ How It Works</h4>
      <p>Uses TF-IDF vectorization + cosine similarity to find the best matching FAQ — no external API needed!</p>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-wrap">
    <div class="chat-box">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your question here..." maxlength="300" onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── FAQ Knowledge Base ────────────────────────────────────────────────────
const faqData = [
  {
    q: "What is the refund policy?",
    a: "We offer a **full refund within 7 days** of purchase, no questions asked. After 7 days, refunds are considered on a case-by-case basis. To request a refund, contact our support team with your order ID.",
    tags: ["refund", "money back", "return", "cancel order", "reimbursement"]
  },
  {
    q: "How do I reset my password?",
    a: "To reset your password: go to the login page → click **'Forgot Password'** → enter your email → check your inbox for the reset link. The link expires in 30 minutes.",
    tags: ["password", "forgot password", "login", "reset", "can't log in", "access account"]
  },
  {
    q: "How do I contact support?",
    a: "You can reach our support team via:\n📧 Email: support@example.com\n💬 Live chat (bottom-right corner)\n📞 Phone: 1800-XXX-XXXX (Mon–Fri 9AM–6PM IST)",
    tags: ["contact", "support", "help", "phone", "email", "reach", "talk to someone"]
  },
  {
    q: "What are your working hours?",
    a: "Our support team is available **Monday to Friday, 9 AM – 6 PM IST**. For urgent issues outside these hours, email us and we'll respond the next business day.",
    tags: ["hours", "working hours", "open", "available", "timing", "when", "office hours"]
  },
  {
    q: "What payment methods do you accept?",
    a: "We accept the following payment methods:\n💳 Credit/Debit Cards (Visa, Mastercard, Amex)\n🏦 Net Banking\n📱 UPI (Google Pay, PhonePe, Paytm)\n💰 Wallets & EMI options",
    tags: ["payment", "pay", "credit card", "debit card", "upi", "netbanking", "methods", "checkout"]
  },
  {
    q: "How do I track my order?",
    a: "Track your order by:\n1. Log in to your account\n2. Go to **My Orders**\n3. Click on your order to see real-time status\nYou'll also receive SMS/email updates at every stage.",
    tags: ["track", "order", "delivery", "shipping", "where is my order", "status", "dispatch"]
  },
  {
    q: "Is my data secure?",
    a: "Yes! We take data security seriously:\n🔒 256-bit SSL encryption on all pages\n🛡️ GDPR & IT Act compliant\n🔑 Your data is never sold to third parties\n🔄 Regular security audits",
    tags: ["data", "security", "privacy", "safe", "encryption", "gdpr", "information"]
  },
  {
    q: "How to cancel my subscription?",
    a: "To cancel your subscription:\n1. Go to **Account Settings → Subscription**\n2. Click **Cancel Plan**\n3. Confirm the cancellation\nYou'll retain access until the end of your billing cycle.",
    tags: ["cancel", "subscription", "unsubscribe", "stop", "end plan", "billing"]
  },
  {
    q: "How do I update my email address?",
    a: "To update your email:\n1. Log in and go to **Account Settings**\n2. Click **Edit** next to your email\n3. Enter the new email and verify it\nNote: You'll need to verify both the old and new emails for security.",
    tags: ["email", "update email", "change email", "account settings", "profile"]
  },
  {
    q: "Do you offer a free trial?",
    a: "Yes! We offer a **14-day free trial** with full access to all features. No credit card required to start. You can upgrade to a paid plan anytime during or after the trial.",
    tags: ["free trial", "trial", "try", "test", "demo", "free", "no cost"]
  },
  {
    q: "What are the pricing plans?",
    a: "We have 3 plans:\n🥈 **Basic** – ₹499/mo (5 users, core features)\n🥇 **Pro** – ₹999/mo (20 users, advanced features)\n🏆 **Enterprise** – Custom pricing (unlimited users, dedicated support)",
    tags: ["price", "pricing", "cost", "plan", "how much", "subscription", "fee", "monthly"]
  },
  {
    q: "How do I download my invoice?",
    a: "To download your invoice:\n1. Log in → **Account → Billing**\n2. Find the transaction\n3. Click **Download Invoice** (PDF format)\nInvoices are available for all paid transactions.",
    tags: ["invoice", "bill", "receipt", "download", "billing", "payment proof", "gst"]
  },
  {
    q: "What browsers are supported?",
    a: "We support all modern browsers:\n✅ Google Chrome (recommended)\n✅ Mozilla Firefox\n✅ Microsoft Edge\n✅ Safari\n❌ Internet Explorer is not supported.",
    tags: ["browser", "chrome", "firefox", "safari", "compatibility", "supported"]
  },
  {
    q: "How do I delete my account?",
    a: "To delete your account permanently:\n1. Go to **Account Settings → Privacy**\n2. Scroll to **Delete Account**\n3. Enter your password and confirm\n⚠️ This action is irreversible and all your data will be deleted.",
    tags: ["delete account", "remove account", "close account", "deactivate", "permanent delete"]
  },
  {
    q: "How long does delivery take?",
    a: "Delivery times vary by location:\n🏙️ Metro cities: 2–3 business days\n🏘️ Tier 2/3 cities: 4–6 business days\n🌾 Remote areas: 7–10 business days\nExpress delivery (1–2 days) is available at extra cost.",
    tags: ["delivery", "shipping time", "how long", "when will I receive", "dispatch", "days"]
  }
];

// ─── NLP: TF-IDF Cosine Similarity ────────────────────────────────────────
function tokenize(text) {
  const stopwords = new Set(["a","an","the","is","it","in","on","at","to","of","and","or","for","with","my","i","do","how","what","can","will","does","are","be","was","have","has","me","you","we","your","our","this","that","please","hi","hello","hey","could","would","should","when","where","why","which"]);
  return text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(t => t.length > 1 && !stopwords.has(t));
}

function cosineSim(v1, v2) {
  const keys = new Set([...Object.keys(v1), ...Object.keys(v2)]);
  let dot = 0, mag1 = 0, mag2 = 0;
  keys.forEach(k => {
    const a = v1[k] || 0, b = v2[k] || 0;
    dot += a * b; mag1 += a * a; mag2 += b * b;
  });
  return (mag1 && mag2) ? dot / (Math.sqrt(mag1) * Math.sqrt(mag2)) : 0;
}

function tfIdf(tokens, allDocs) {
  const tf = {}, idf = {}, N = allDocs.length;
  tokens.forEach(t => tf[t] = (tf[t] || 0) + 1);
  Object.keys(tf).forEach(t => tf[t] /= tokens.length);
  tokens.forEach(t => {
    const df = allDocs.filter(d => d.includes(t)).length;
    idf[t] = Math.log((N + 1) / (df + 1)) + 1;
  });
  const vec = {};
  tokens.forEach(t => vec[t] = tf[t] * idf[t]);
  return vec;
}

function findBestMatch(query) {
  const qTokens = tokenize(query);
  // build corpus from all FAQ questions + tags
  const allDocs = faqData.map(f => tokenize(f.q.concat(' ' + f.tags.join(' '))));
  const qVec = tfIdf(qTokens, allDocs);

  let best = { score: 0, idx: -1 };
  allDocs.forEach((docTokens, i) => {
    const dVec = tfIdf(docTokens, allDocs);
    const score = cosineSim(qVec, dVec);
    if (score > best.score) best = { score, idx: i };
  });
  return best;
}

// ─── Suggestions ──────────────────────────────────────────────────────────
const suggestions = [
  "What is the refund policy?",
  "How do I reset my password?",
  "What are your working hours?",
  "Do you offer a free trial?",
];

// ─── Chat Logic ───────────────────────────────────────────────────────────
function addMessage(role, content, confidence = null, showSuggestions = false) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarChar = role === 'bot' ? '🤖' : '👤';
  let confBadge = '';
  if (confidence !== null) {
    const pct = Math.round(confidence * 100);
    let cls = pct >= 60 ? 'conf-high' : pct >= 35 ? 'conf-med' : 'conf-low';
    confBadge = `<div><span class="confidence ${cls}">${pct >= 60 ? '✓ High' : pct >= 35 ? '~ Medium' : '⚠ Low'} confidence (${pct}%)</span></div>`;
  }

  let sugHtml = '';
  if (showSuggestions) {
    sugHtml = `<div class="suggestions">${suggestions.map(s => `<button class="sug-btn" onclick="askTopic('${s}')">${s}</button>`).join('')}</div>`;
  }

  const formattedContent = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');

  div.innerHTML = `
    <div class="msg-avatar">${avatarChar}</div>
    <div>
      <div class="bubble">${formattedContent}${confBadge}${sugHtml}</div>
    </div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">🤖</div>
    <div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>
  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function processQuery(query) {
  const trimmed = query.trim();
  if (!trimmed) return;

  // Greetings
  if (/^(hi|hello|hey|howdy|good morning|good evening|namaste|sup)\b/.test(trimmed.toLowerCase())) {
    setTimeout(() => {
      removeTyping();
      addMessage('bot', "Hello! 👋 I'm **SupportBot**. I can answer questions about our services. What would you like to know?", null, true);
    }, 600);
    return;
  }

  // Thanks
  if (/^(thanks|thank you|thx|ty|great|awesome|perfect)\b/.test(trimmed.toLowerCase())) {
    setTimeout(() => {
      removeTyping();
      addMessage('bot', "You're welcome! 😊 Is there anything else I can help you with?");
    }, 400);
    return;
  }

  const { score, idx } = findBestMatch(trimmed);

  setTimeout(() => {
    removeTyping();
    if (score > 0.1 && idx !== -1) {
      const item = faqData[idx];
      addMessage('bot', `**${item.q}**\n\n${item.a}`, score);
    } else {
      addMessage('bot', "I'm not sure I have the right answer for that 🤔\n\nHere are some topics I can help with:", null, true);
    }
  }, 700 + Math.random() * 300);
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';
  showTyping();
  processQuery(text);
}

function askTopic(q) {
  document.getElementById('userInput').value = q;
  sendMessage();
}

// ─── Init ─────────────────────────────────────────────────────────────────
window.onload = () => {
  addMessage('bot', "👋 Hi! I'm **SupportBot**, your AI-powered FAQ assistant.\n\nI use **TF-IDF cosine similarity** to match your questions to the best answers from our knowledge base.\n\nHow can I help you today?", null, true);
};
</script>
</body>
</html>
